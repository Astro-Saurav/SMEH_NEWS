user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─── Logging ─────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # ─── Performance ─────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    # ─── Gzip Compression ────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/rss+xml application/atom+xml
               image/svg+xml font/ttf font/opentype application/x-font-ttf;

    # ─── Client Limits ───────────────────────────────────────────
    client_max_body_size 25M;
    client_body_buffer_size 128k;

    # ─── Rate Limiting ───────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_req_status 429;

    # ─── Proxy Settings ──────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # ─── DNS Resolver ─────────────────────────────────────────────
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    # ─── Main HTTP Server (Development/Local) ────────────────────
    server {
        listen 80;
        server_name localhost 127.0.0.1;

        # ─── Security Headers ─────────────────────────────────────
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # ─── Health Endpoints (no rate limit) ────────────────────
        location /api/live { proxy_pass http://express-api:8080; }
        location /api/ready { proxy_pass http://express-api:8080; }
        location /api/health { proxy_pass http://express-api:8080; }

        # ─── Auth Routes (strict rate limit) ─────────────────────
        location /api/v1/auth {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://express-api:8080;
        }
        location /api/auth {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://express-api:8080;
        }

        # ─── API Routes ───────────────────────────────────────────
        location /api {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://express-api:8080;
        }

        # ─── Uploaded Media Serving ───────────────────────────────
        location /uploads {
            alias /var/www/mrt/uploads;
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff";
        }

        # ─── Next.js App ──────────────────────────────────────────
        location / {
            proxy_pass http://nextjs:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support for HMR
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # ─── Next.js Static Assets ────────────────────────────────
        location /_next/static {
            proxy_pass http://nextjs:3000;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
